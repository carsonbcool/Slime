<html>
<head>
    <script type="text/javascript" src="Slime.js"></script>
    <script type="text/javascript" src="Input.js"></script>
    <script type="text/javascript" src="SlimeAI.js"></script>
    <script type="text/javascript">
        var ctx, canvas, gameWidth, gameHeight, pixelsPerUnit;
        var ball, slime1, slime2, slimeLeft, slimeRight;
        var slime1Score = 0, slime2Score = 0;
        var gameRunning = false, gameMode = '1P', activeAI = null;

        // --- TOURNAMENT CONSTANTS FROM CWEST ---
        var GRAVITY_BALL = 1;
        var GRAVITY_SLIME = 2;
        var JUMP_POWER = 31;
        var MAX_VELOCITY_X = 15;
        var MAX_VELOCITY_Y = 22;

        function startLevel(mode) {
            gameMode = mode;
            gameRunning = true;
            document.getElementById('menu').style.display = 'none';
            if (gameMode === '1P') {
                activeAI = newSlimeAI(false, "Slime Master");
                setMasterSlime(activeAI);
            }
            initRound(true);
        }

        function updateSlimeVelocities(s, left, right, up) {
            s.velocityX = keysDown[left] ? (keysDown[right] ? 0 : -8) : (keysDown[right] ? 8 : 0);
            if (s.y == 0 && keysDown[up]) s.velocityY = JUMP_POWER;
        }

        function updateSlime(s, leftLimit, rightLimit) {
            if (s.velocityX != 0) {
                s.x += s.velocityX;
                if (s.x < leftLimit) s.x = leftLimit;
                if (s.x > rightLimit) s.x = rightLimit;
            }
            if (s.y > 0 || s.velocityY != 0) {
                s.velocityY -= GRAVITY_SLIME;
                s.y += s.velocityY;
                if (s.y < 0) { s.y = 0; s.velocityY = 0; }
            }
        }

        function collisionBallSlime(s) {
            var dx = 2 * (ball.x - s.x);
            var dy = ball.y - s.y;
            var dist = Math.trunc(Math.sqrt(dx * dx + dy * dy));
            if (dy > 0 && dist < ball.radius + s.radius && dist > 5) {
                ball.x = s.x + Math.trunc(Math.trunc((s.radius + ball.radius) / 2) * dx / dist);
                ball.y = s.y + Math.trunc((s.radius + ball.radius) * dy / dist);
                var dVX = ball.velocityX - s.velocityX;
                var dVY = ball.velocityY - s.velocityY;
                var something = Math.trunc((dx * dVX + dy * dVY) / dist);
                if (something <= 0) {
                    ball.velocityX += Math.trunc(s.velocityX - 2 * dx * something / dist);
                    ball.velocityY += Math.trunc(s.velocityY - 2 * dy * something / dist);
                    if (ball.velocityX < -MAX_VELOCITY_X) ball.velocityX = -MAX_VELOCITY_X;
                    else if (ball.velocityX > MAX_VELOCITY_X) ball.velocityX = MAX_VELOCITY_X;
                    if (ball.velocityY < -MAX_VELOCITY_Y) ball.velocityY = -MAX_VELOCITY_Y;
                    else if (ball.velocityY > MAX_VELOCITY_Y) ball.velocityY = MAX_VELOCITY_Y;
                }
            }
        }

        function updateBall() {
            ball.velocityY = Math.max(ball.velocityY - GRAVITY_BALL, -MAX_VELOCITY_Y);
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;
            collisionBallSlime(slime1);
            collisionBallSlime(slime2);
            if (ball.x < 15) { ball.x = 15; ball.velocityX = -ball.velocityX; }
            else if (ball.x > 985) { ball.x = 985; ball.velocityX = -ball.velocityX; }
            if (ball.x > 480 && ball.x < 520 && ball.y < 140) {
                if (ball.velocityY < 0 && ball.y > 130) { ball.velocityY *= -1; ball.y = 130; }
                else if (ball.x < 500) { ball.x = 480; ball.velocityX = -Math.abs(ball.velocityX); }
                else { ball.x = 520; ball.velocityX = Math.abs(ball.velocityX); }
            }
            if (ball.y < 0) {
                if (ball.x > 500) { slime1Score++; initRound(true); }
                else { slime2Score++; initRound(false); }
            }
        }

        function updateFrame() {
            if (!gameRunning) return;
            updateSlimeVelocities(slime1, KEY_A, KEY_D, KEY_W);
            if (gameMode === '2P') {
                updateSlimeVelocities(slime2, KEY_LEFT, KEY_RIGHT, KEY_UP);
            } else if (activeAI) {
                activeAI.move();
                slime2.velocityX = (activeAI.movement === 1) ? -8 : (activeAI.movement === 2 ? 8 : 0);
                if (activeAI.jumpSet && slime2.y === 0) slime2.velocityY = JUMP_POWER;
            }
            updateSlime(slime1, 50, 445);
            updateSlime(slime2, 555, 950);
            updateBall();
        }

        function renderBackground() {
            var cH = gameHeight / 5;
            ctx.fillStyle = '#0077ff'; ctx.fillRect(0, 0, gameWidth, gameHeight - cH);
            ctx.fillStyle = '#ca6'; ctx.fillRect(0, gameHeight - cH, gameWidth, cH);
            ctx.fillStyle = '#fff'; ctx.fillRect(gameWidth/2 - 2, 7*gameHeight/10, 4, gameHeight/10 + 5);
        }

        function renderGame() {
            renderBackground();
            ctx.font = "20px Georgia"; ctx.fillStyle = "white";
            ctx.fillText("Score: " + slime1Score, 20, 30);
            ctx.fillText("Score: " + slime2Score, gameWidth - 120, 30);
            ball.render(); slime1.render(); slime2.render();
        }

        function gameIteration() {
            updateFrame();
            requestAnimationFrame(renderGame);
        }

        function initRound(server) {
            ball.x = server ? 200 : 800; ball.y = 356;
            ball.velocityX = 0; ball.velocityY = 0;
            slime1.x = 200; slime1.y = 0;
            slime2.x = 800; slime2.y = 0;
        }

        function bodyload() {
            canvas = document.getElementById("gameCanvas");
            ctx = canvas.getContext("2d");
            gameWidth = 1000; gameHeight = 1000; // Physics units
            pixelsPerUnit = canvas.width / 1000;
            ball = newBall(25, '#ff0');
            slime1 = newSlime(100, '#f00'); slime2 = newSlime(100, '#0f0');
            slimeLeft = slime1; slimeRight = slime2;
            initRound(true);
            setInterval(gameIteration, 20);
        }
    </script>
</head>
<body onload="bodyload()" style="margin:0; display:flex; justify-content:center; align-items:center; background:#222; height:100vh;">
    <div style="position: relative;">
        <div id="menu" style="position: absolute; width: 750px; height: 375px; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; border-radius: 15px; border: 3px solid #0077ff;">
            <h1 style="font-family: Arial; font-size: 40px; margin: 0;">SLIME VOLLEYBALL</h1>
            <button style="width: 220px; padding: 12px; margin: 8px; cursor: pointer; font-weight: bold; background: #ff4444; color: white; border: 2px solid white; border-radius: 30px;" onclick="startLevel('1P')">1 PLAYER</button>
            <button style="width: 220px; padding: 12px; margin: 8px; cursor: pointer; font-weight: bold; background: #44ff44; color: black; border: 2px solid white; border-radius: 30px;" onclick="startLevel('2P')">2 PLAYER</button>
        </div>
        <canvas id="gameCanvas" width="750" height="375" style="border: 2px solid #000;"></canvas>
    </div>
</body>
</html>
