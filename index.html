<html>
<head>
    <script type="text/javascript" src="Slime.js"></script>
    <script type="text/javascript" src="Input.js"></script>
    <script type="text/javascript" src="SlimeAI.js"></script>
    <script type="text/javascript">

        // RENDER DATA
        var ctx;
        var canvas;
        var gameWidth, gameHeight;
        var pixelsPerUnit;
        var updatesToPaint;

        // GAME DATA
        var ball;
        var slime1;
        var slime2;
        var slime1Score;
        var slime2Score;

        // NEW: MENU DATA
        var gameRunning = false;
        var gameMode = '2P'; 

        function startLevel(mode) {
            gameMode = mode;
            gameRunning = true;
            document.getElementById('menu').style.display = 'none';
            initRound(true);
        }

        // Game Update Functions
        function updateSlimeVelocities(s, left, right, up) {
            if (keysDown[left]) {
                if (keysDown[right]) {
                    s.velocityX = 0;
                } else {
                    s.velocityX = -8;
                }
            } else if (keysDown[right]) {
                s.velocityX = 8;
            } else {
                s.velocityX = 0;
            }
            if (s.y == 0 && keysDown[up]) {
                s.velocityY = 18;
            }
        }

        function updateSlime(s, leftLimit, rightLimit) {
            if (s.velocityX != 0) {
                s.x += s.velocityX;
                if (s.x - s.radius < leftLimit) {
                    s.x = leftLimit + s.radius;
                } else if (s.x + s.radius > rightLimit) {
                    s.x = rightLimit - s.radius;
                }
            }
            if (s.y > 0 || s.velocityY != 0) {
                s.y += s.velocityY;
                s.velocityY -= 1.2;
                if (s.y < 0) {
                    s.y = 0;
                    s.velocityY = 0;
                }
            }
        }

        var MAX_VELOCITY_X = 15;
        var MAX_VELOCITY_Y = 11;

        function collisionBallSlime(s) {
            var dx = ball.x - s.x;
            var dy = ball.y - s.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            var dVelocityX = ball.velocityX - s.velocityX;
            var dVelocityY = ball.velocityY - s.velocityY;

            if (dy > 0 && dist < ball.radius + s.radius) {
                ball.x = s.x + (s.radius + ball.radius) * dx / dist;
                ball.y = s.y + (s.radius + ball.radius) * dy / dist;
                var something = (dx * dVelocityX + dy * dVelocityY) / dist;
                if (something <= 0) {
                    ball.velocityX += s.velocityX - 1.92 * dx * something / dist;
                    ball.velocityY += s.velocityY - 1.92 * dy * something / dist;
                    if (ball.velocityX < -MAX_VELOCITY_X) ball.velocityX = -MAX_VELOCITY_X;
                    else if (ball.velocityX > MAX_VELOCITY_X) ball.velocityX = MAX_VELOCITY_X;
                    if (ball.velocityY < -MAX_VELOCITY_Y) ball.velocityY = -MAX_VELOCITY_Y;
                    else if (ball.velocityY > MAX_VELOCITY_Y) ball.velocityY = MAX_VELOCITY_Y;
                }
            }
        }

        function updateBall() {
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;
            ball.velocityY += -.5;
            if (ball.velocityY < -MAX_VELOCITY_Y) ball.velocityY = -MAX_VELOCITY_Y;

            collisionBallSlime(slime1);
            collisionBallSlime(slime2);

            if (ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.velocityX = -ball.velocityX;
            } else if (ball.x + ball.radius > 1000) {
                ball.x = 1000 - ball.radius;
                ball.velocityX = -ball.velocityX;
            }

            if (ball.y < 0) {
                if (ball.x > 500) {
                    slime1Score++;
                    initRound(true);
                } else {
                    slime2Score++;
                    initRound(false);
                }
            }
        }

        function updateFrame() {
            if (!gameRunning) return; // Brake until button is clicked

            // Player 1
            updateSlimeVelocities(slime1, KEY_A, KEY_D, KEY_W);

            // Player 2 or AI
            if (gameMode === '2P') {
                updateSlimeVelocities(slime2, KEY_LEFT, KEY_RIGHT, KEY_UP);
            } else {
                if (typeof controlSlime === "function") {
                    controlSlime(slime2, ball);
                }
            }

            updateSlime(slime1, 0, 495);
            updateSlime(slime2, 505, 1000);
            updateBall();
        }

        function renderBackground() {
            var courtHeight = gameHeight / 5;
            ctx.fillStyle = '#0077ff'
            ctx.fillRect(0, 0, gameWidth, gameHeight - courtHeight);
            ctx.fillStyle = '#ca6'
            ctx.fillRect(0, gameHeight - courtHeight, gameWidth, courtHeight);
            ctx.fillStyle = '#fff'
            ctx.fillRect(gameWidth / 2 - 2, 7 * gameHeight / 10, 4, gameHeight / 10 + 5);
        }

        function renderGame() {
            if (updatesToPaint != 0) {
                renderBackground();
                ctx.font = "20px Georgia";
                ctx.fillStyle = "white";
                ctx.fillText("Score: " + slime1Score, 20, 30);
                ctx.fillText("Score: " + slime2Score, gameWidth - 120, 30);
                ball.render();
                slime1.render();
                slime2.render();
                updatesToPaint = 0;
            }
        }

        function gameIteration() {
            updateFrame();
            updatesToPaint++;
            requestAnimationFrame(renderGame);
        }

        function initRound(server) {
            ball.x = server ? 200 : 800;
            ball.y = 200;
            ball.velocityX = 0;
            ball.velocityY = 0;
            slime1.x = 200; slime1.y = 0;
            slime2.x = 800; slime2.y = 0;
        }

        function updateWindowSize(width, height) {
            gameWidth = width;
            gameHeight = height;
            pixelsPerUnit = gameWidth / 1000;
        }

        function bodyload() {
            canvas = document.getElementById("gameCanvas");
            ctx = canvas.getContext("2d");
            updateWindowSize(canvas.width, canvas.height);
            ball = newBall(15, '#ff0');
            slime1 = newSlime(50, '#f00');
            slime2 = newSlime(50, '#0f0');
            slime1Score = 0;
            slime2Score = 0;
            initRound(true);
            setInterval(gameIteration, 20);
        }
    </script>
</head>

<body onload="bodyload()" style="margin: 0; display: flex; justify-content: center; align-items: center; background: #333; height: 100vh;">
    <div style="position: relative;">
        <div id="menu" style="position: absolute; width: 730px; height: 365px; background: rgba(0,0,0,0.8); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; border-radius: 10px;">
            <h1 style="font-family: Georgia; margin-bottom: 30px;">SLIME VOLLEYBALL</h1>
            <button style="padding: 15px 40px; margin: 10px; cursor: pointer; font-size: 18px; background: #f00; color: white; border: none; border-radius: 5px;" onclick="startLevel('1P')">1 PLAYER</button>
            <button style="padding: 15px 40px; margin: 10px; cursor: pointer; font-size: 18px; background: #0f0; color: black; border: none; border-radius: 5px;" onclick="startLevel('2P')">2 PLAYER</button>
        </div>
        
        <canvas id="gameCanvas" width="730" height="365" style="border: 2px solid #000; display: block;"></canvas>
    </div>
</body>
</html>
